name: Fetch Banners

on:
  workflow_dispatch:
    inputs:
      devices:
        description: "Device names (comma-separated)"
        required: true
        example: "DUCHAMP,INGRES,MONDRIAN"

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch banners
        run: |
          IFS=',' read -ra DEVICES <<< "${{ inputs.devices }}"
          node fetch-banner.js "${DEVICES[@]}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add banners/
          git diff --staged --quiet || git commit -m "Update banners"
          git push
